name:         hydra
version:      0.15.0
author:       Joshua Shinavier <josh@fortytwo.net>
license:      Apache-2.0
license-file: LICENSE
category:     Data
synopsis:     Graph programming language (bootstrapped)
description:  >
  Bootstrapped Hydra — generated from JSON modules by a non-Haskell host.
github:       CategoricalData/hydra

extra-source-files:
  - LICENSE
  - README.md
  - stack.yaml

dependencies:
  - aeson                         >= 2.1.0 && < 2.3
  - base                          >= 4.19.0 && < 4.22
  - base64-bytestring             >= 1.2.1 && < 1.3
  - regex-tdfa                    >= 1.3.0 && < 1.4
  - bytestring                    >= 0.11.5 && < 0.13
  - containers                    >= 0.6.7 && < 0.8
  - directory                     >= 1.3.6 && < 1.4
  - filepath                      >= 1.4.200 && < 1.6
  - scientific                    >= 0.3.7 && < 0.4
  - SHA                           >= 1.6.4 && < 1.7
  - split                         >= 0.2.3 && < 0.3
  - text                          >= 2.0.2 && < 2.2
  - vector                        >= 0.12.0 && < 0.14

library:
  source-dirs:
    - src/main/haskell

tests:
  hydra-test:
    main: Spec.hs
    source-dirs:
      - src/test/haskell
    dependencies:
      - hydra
      - hspec                      >= 2.11.0 && < 2.12
      - hspec-discover              >= 2.11.0 && < 2.12
      - HUnit
      - QuickCheck
      - mtl
      - process
      - time
