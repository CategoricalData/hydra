name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI model, per feature_290_packaging:
#
#   * The Haskell job is the "JSON build". It regenerates dist/json/
#     from DSL sources, regenerates dist/<lang>/ for every target from
#     the JSON, runs stack test, and fails if the regenerated dist/json/
#     differs from what's committed (the sole tree tracked in git; every
#     dist/<lang>/ tree, including dist/haskell/, is gitignored and only
#     built for downstream consumption / self-containment checks — see
#     the determinism-diff and cold-clone-haskell jobs below for how
#     dist/haskell/ consistency is verified without a committed tree to
#     diff against).
#
#   * The regenerated dist/<lang>/ trees for java, python, scala, and
#     each Lisp dialect are uploaded as build artifacts so the target
#     jobs below can run tests against them without needing to install
#     Stack + GHC or rebuild the Hydra library themselves.
#
#   * Every other target job downloads its dist artifact and runs its
#     native test suite. They do not run Phase 1 (DSL -> JSON) or
#     Phase 2 (JSON -> target source) themselves; that's the Haskell
#     job's responsibility.
#
#   * The regression-harnesses job (#563) runs the #535 standalone
#     regression scripts (bin/test-regressions.sh) separately from the
#     haskell job. It needs the haskell job's dist-diff check to have
#     passed (so committed dist/json/ is known-fresh) but not its dist
#     artifacts: dist/json/ is git-committed, so a fresh checkout already
#     has it. It builds its own standalone Haskell executables from
#     source, so it sets up its own Stack/GHC toolchain independent of
#     the haskell job's stack project.
#
# This matches integration's de-facto CI topology: one expensive job
# producing JSON + all target source trees; cheap jobs consuming those
# and running target-language tests.

jobs:
  haskell:
    name: Haskell tests (JSON build + consistency check)
    runs-on: ubuntu-latest
    # A healthy full cold run (regenerate all-target dists + stack tests) was ~2.5h
    # (historically 2h19m-2h43m). The old 200min ceiling sat above that — but the
    # #535 regression-harnesses step (bin/test-regressions.sh, which builds four
    # standalone Haskell executables from source before running them) plus kernel
    # growth pushed real work PAST 200min: every run from 2026-07-06 11:17Z onward
    # was killed at exactly 200m00s on the final regression step (GitHub reports a
    # timeout-kill as "cancelled", so it masqueraded as a runner stall for ~30h).
    # Raised to 300min: headroom above the now-longer run while still well under
    # GitHub's 6h default, so a genuinely wedged job still fails deterministically
    # rather than needing a human to guess "is it hung?".
    # #563: the regression-harnesses step itself has since moved to its own job
    # (below), removing that specific driver of growth. Left at 300 rather than
    # retuned back down without fresh measurement of the job's duration post-split;
    # #546-class additions (new packages, per-package digests) remain a live
    # accretion risk. If this ceiling is approached again, look for a similar
    # self-contained tail to split out before raising it further.
    # See #494 CI investigation.
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      # #541: cheap, toolchain-free gate that must run before anything else
      # in this job. Guards against the #416 near-miss, where a .gitignore
      # pattern silently untracked kernel JSON that manifest.json declared --
      # present on disk in every worktree, invisible to every runtime test,
      # and only a fresh clone (like this CI checkout) would fail to
      # bootstrap. Needs only python3 + git, both preinstalled on the runner.
      - name: Check manifest-declared module JSON is tracked in git (#541)
        run: python3 bin/check-manifest-json-tracked.py
      # #608: cheap, toolchain-free gate. Fails if any published-host driver
      # (heads/**/package.yaml) links a published hydra-* package while ALSO
      # source-dirring the matching packages/<pkg>/src/main/haskell HEAD authoring
      # tree — the oil-and-water violation that reddened main on every new-kernel-
      # type PR (the #376 cold-seeder linked published hydra-kernel-0.17.1 while
      # source-dirring HEAD's kernel Terms DSL, phantom-annotated with #598 types
      # absent from 0.17.1). Needs only python3 + git.
      - name: Check oil-and-water invariant for published-host drivers (#608)
        run: python3 bin/check-oil-and-water.py
      # ghc-version pinned: this job's bin/sync.sh cold-start path builds the
      # json-driver (heads/haskell/json-driver/, system-ghc/resolver lts-24.7 =>
      # ghc-9.10.2) whenever dist/haskell/ is absent — e.g. after a version bump
      # invalidates the ~/.stack cache. Without the pin, haskell-actions/setup
      # provisions a different GHC and the cold-seed fails with S-6362. Same fix
      # as the cold-clone-haskell and Regression-harnesses jobs.
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.10.2'
          enable-stack: true
          stack-version: latest
      # uv is required by bin/generate-hydra-python-from-python.sh (Phase 5
      # native Python self-host, default INTERP=uv) which runs as part of
      # the sync step below.
      - uses: astral-sh/setup-uv@v5
      - uses: actions/cache@v4
        with:
          path: ~/.stack
          key: stack-${{ hashFiles('heads/haskell/stack.yaml', 'heads/haskell/package.yaml') }}
          restore-keys: stack-
      # Regenerate dist/json/ from DSL sources (Phase 1, batch mode)
      # and dist/<lang>/ for every target from the JSON (Phase 2,
      # per-package). Any drift from the committed dist/json/ or
      # dist/haskell/ tree fails the job.
      - name: Regenerate JSON and all target dists from DSL sources
        run: |
          bin/sync.sh --hosts all --targets all --no-tests
      # The bootstrapping matrix above intentionally skips the "on-
      # demand" packages (hydra-pg, hydra-rdf, hydra-ext). The Java
      # host's checked-in sources (packages/hydra-java/src/main/java/
      # hydra/pg/**, hydra/rdf/**) import from these dist/java subtrees,
      # so the Java CI job below can't compile without them. Generate
      # them into the target languages that need them. Python's
      # pythonpath also references these trees, though Python silently
      # skips missing entries; generating for hygiene.
      - name: Regenerate on-demand packages (hydra-pg, hydra-rdf, hydra-ext)
        run: |
          for pkg in hydra-pg hydra-rdf hydra-ext; do
            for tgt in java python; do
              bin/sync-packages.sh "$pkg" --targets "$tgt" --no-tests
            done
          done
      # #469/#376: pointed guard for the native-coder JSON->Haskell render gate.
      # Forces a cache miss by deleting the per-package output digest, re-runs
      # the assembler against committed JSON, and fails on any diff FROM A
      # SECOND REGENERATION IN THIS RUN — not from the committed tree, since
      # dist/haskell/ is untracked (#376) and has no committed form to diff
      # against. This still catches the recurrence pattern this guard was
      # written for (Phase 5 short-circuits but the .hs would be stale w.r.t.
      # a fresh render of the committed JSON): a real generator bug that makes
      # rendering non-deterministic, or a stale digest that masks a JSON-driven
      # change, shows up as a diff between the two same-input regenerations.
      # Independent from the broader idempotency check below: if that one
      # passes, this is a no-op redundancy; if not, this points at the
      # specific package.
      - name: Force-regen dist/haskell/hydra-{java,python} twice and diff
        run: |
          set -e
          # Compare only the RENDERED SOURCE across two regenerations. The
          # build/ subtree holds cache artifacts (build/main/digest.json is a
          # content digest whose serialization is not byte-stable across runs and
          # is gitignored for exactly that reason), so excluding build/ here is
          # correct — it is not generated output. Pre-#376 this step used
          # `git diff`, which never saw build/ (gitignored even in the then-tracked
          # tree); the #376 switch to `diff -rq` (needed once dist/haskell/ became
          # untracked) must exclude build/ to preserve that behavior, else the
          # non-stable digest.json produces a spurious non-determinism failure.
          for pkg in hydra-java hydra-python; do
            rm -f "dist/haskell/$pkg/build/main/digest.json"
            heads/haskell/bin/assemble-distribution.sh "$pkg"
            cp -r "dist/haskell/$pkg" "/tmp/dist-haskell-$pkg-pass1"
            rm -f "dist/haskell/$pkg/build/main/digest.json"
            heads/haskell/bin/assemble-distribution.sh "$pkg"
            if ! diff -rq --exclude=build "/tmp/dist-haskell-$pkg-pass1" "dist/haskell/$pkg"; then
              echo "::error::dist/haskell/$pkg/ is non-deterministic: two regenerations from the same committed dist/json/$pkg/ produced different rendered source."
              diff -rq --exclude=build "/tmp/dist-haskell-$pkg-pass1" "dist/haskell/$pkg" | head -100
              exit 1
            fi
          done
      - name: Fail if committed dist/json differs from regenerated
        run: |
          if ! git diff --quiet dist/json/; then
            echo "::error::Generated dist/json/ differs from the committed tree."
            echo "::error::Run bin/sync.sh locally and commit the result."
            git diff --stat dist/json/
            exit 1
          fi
      # NOTE (#376): a full-tree "regenerate dist/haskell a second time and diff"
      # determinism gate previously lived here. It was REMOVED because it ran a
      # second full `bin/sync.sh --hosts all --targets all` (~2.5h under the #592
      # cold JSON-generation cost) purely to diff for non-determinism — doubling
      # this job's runtime past its timeout — while providing no real coverage:
      # the second sync's caches short-circuit so it re-renders ~nothing, making
      # the diff tautologically clean (verified). Determinism/idempotency of the
      # rendered output is already guarded by (a) the per-package Force-regen gate
      # for hydra-{java,python} above, (b) the cold-clone-haskell job below (an
      # independent from-dist/json seed that must build + stack test), and (c) the
      # committed-dist/json diff. If a broader per-package determinism sweep is
      # wanted later, do it WITHOUT a second all-target sync (see #592 follow-up).
      - name: Stack tests
        run: stack test
        working-directory: heads/haskell
      # Self-containment gate: stage the per-package distributions into one
      # stack project and build them as published, so a package that references
      # something present only in heads/ (not in dist/) fails here — the #473
      # cold-build class of bug — before it reaches Hackage.
      - name: Verify Haskell distribution self-containment
        run: heads/haskell/bin/verify-distribution.sh
      # Upload dist/<lang>/ trees for downstream target jobs. One
      # artifact per target so each job only pays for its own download.
      - name: Upload dist/java
        uses: actions/upload-artifact@v4
        with:
          name: dist-java
          path: dist/java/
          retention-days: 1
      - name: Upload dist/python
        uses: actions/upload-artifact@v4
        with:
          name: dist-python
          path: dist/python/
          retention-days: 1
      - name: Upload dist/scala
        uses: actions/upload-artifact@v4
        with:
          name: dist-scala
          path: dist/scala/
          retention-days: 1
      - name: Upload dist/clojure
        uses: actions/upload-artifact@v4
        with:
          name: dist-clojure
          path: dist/clojure/
          retention-days: 1
      - name: Upload dist/common-lisp
        uses: actions/upload-artifact@v4
        with:
          name: dist-common-lisp
          path: dist/common-lisp/
          retention-days: 1
      - name: Upload dist/scheme
        uses: actions/upload-artifact@v4
        with:
          name: dist-scheme
          path: dist/scheme/
          retention-days: 1
      - name: Upload dist/emacs-lisp
        uses: actions/upload-artifact@v4
        with:
          name: dist-emacs-lisp
          path: dist/emacs-lisp/
          retention-days: 1
      # #571: dist/typescript/ is gitignored (unlike dist/json/ and
      # dist/haskell/), so the typescript job below can't reuse a committed
      # tree the way e.g. dist/json/ is reused directly from checkout — it
      # needs this artifact, same as every other target job.
      - name: Upload dist/typescript
        uses: actions/upload-artifact@v4
        with:
          name: dist-typescript
          path: dist/typescript/
          retention-days: 1
  # #535/#563: standalone regression harnesses guarding specific prune/reconcile
  # bugs (#393, #405, #469, #357, #551). Split out of the haskell job (#563) so
  # this self-contained tail stops accreting toward that job's timeout ceiling
  # and no longer gates the 8 downstream language jobs. Needs the haskell job's
  # dist-diff check to have passed (committed dist/json/ confirmed fresh) but
  # not its build artifacts: dist/json/ is git-committed, so this job's own
  # checkout already has it. Each script builds its own standalone Haskell
  # executable from source, so this job sets up its own Stack/GHC toolchain
  # rather than reusing the haskell job's stack project (jobs don't share
  # filesystem). Three of the five scripts need dist/json/ and SKIP cleanly
  # without it; two are hermetic. See bin/test-regressions.sh for the list.
  regression-harnesses:
    name: Regression harnesses
    needs: haskell
    runs-on: ubuntu-latest
    # Five small stack builds/execs, not a full sync — generous but bounded.
    # Bumped 60->120: post-#376 this job cold-seeds dist/haskell first (which
    # builds the json-driver + regenerates the kernel tree from dist/json), so
    # it is no longer just "five small stack execs".
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      # ghc-version pinned for the cold-seed's json-driver build (system-ghc,
      # resolver lts-24.7 => ghc-9.10.2); see the cold-clone-haskell job.
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.10.2'
          enable-stack: true
          stack-version: latest
      - uses: astral-sh/setup-uv@v5
      - uses: actions/cache@v4
        with:
          path: ~/.stack
          key: stack-${{ hashFiles('heads/haskell/stack.yaml', 'heads/haskell/package.yaml') }}
          restore-keys: stack-
      # #376: dist/haskell/ is untracked (gitignored), so a fresh checkout has
      # no generated kernel tree — bin/test-regressions.sh's stack build fails
      # with GHC-87110 "Could not find module 'Hydra.Typing'" etc. Cold-seed it
      # from the committed dist/json/ first (same path bin/sync.sh's cold-start
      # detection uses), exactly like the cold-clone-haskell job.
      - name: Cold-seed dist/haskell from committed dist/json (published host)
        run: heads/haskell/json-driver/bin/cold-seed-dist-haskell.sh
      # Post-#418 the overlay/haskell/hydra-kernel runtime files are untracked,
      # so a fresh checkout alone can't build the Haskell project (GHC fails
      # with "Could not find module 'Hydra.Overlay.Haskell.Lib.*'"). git
      # checkout can't restore them either. This is the canonical fix.
      - name: Restore overlay kernel runtime
        run: heads/haskell/bin/overlay-kernel-runtime.sh
      - name: Run regression harnesses
        run: bin/test-regressions.sh

  # #376: durable cold-clone gate. dist/haskell/ is untracked (gitignored) —
  # this is the job that actually proves a genuinely fresh checkout (no
  # dist/haskell/ on disk, none of the haskell job's warm .stack-work state)
  # can still bootstrap: the cold-only json-driver (heads/haskell/json-driver/)
  # seeds all 16 dist/haskell/<pkg>/ trees from the COMMITTED dist/json/ using
  # only the PUBLISHED Hackage coder packages (never a locally-built host —
  # that's the whole point: it must work before the head can compile), then
  # bin/sync.sh's own cold-start detection (the dist/haskell/hydra-kernel
  # sentinel check) picks up from there to build the full host and run tests.
  # Independent of the `haskell` job above: this checkout never runs
  # `bin/sync.sh` with a warm dist/haskell/ already present, so a regression
  # in the cold-seed path (missing package, wrong load flags, a coder that
  # silently isn't on Hackage at the pinned version) fails HERE even if the
  # warm `haskell` job's regenerate-and-diff checks stay green.
  cold-clone-haskell:
    name: Cold-clone Haskell sync (no committed dist/haskell)
    runs-on: ubuntu-latest
    # This job cold-seeds dist/haskell then runs a FULL bin/sync.sh + stack test
    # from scratch with no warm .stack-work — the same ~2.5h workload as the
    # `haskell` job (which budgets 300min), plus the seeder build, and it pays
    # the full cold-clone JSON-generation cost (no incremental digest; see #592).
    # The original 90min ceiling was an optimistic underestimate that timed out.
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      # Pin the GHC the json-driver's stack.yaml expects (resolver lts-24.7 =>
      # ghc-9.10.2). The json-driver project uses system-ghc:true/install-ghc:false,
      # so haskell-actions/setup must provision the matching system GHC or the
      # cold-seed `stack build` fails with S-6362 "No compiler found". The warm
      # `haskell` job builds heads/haskell/'s own project and doesn't hit this.
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.10.2'
          enable-stack: true
          stack-version: latest
      - uses: astral-sh/setup-uv@v5
      - uses: actions/cache@v4
        with:
          path: ~/.stack
          # Separate cache key from the `haskell` job: this job builds the
          # json-driver's own stack project (heads/haskell/json-driver/), a
          # different set of packages than heads/haskell/'s own stack.yaml.
          key: stack-cold-clone-${{ hashFiles('heads/haskell/json-driver/stack.yaml', 'heads/haskell/json-driver/package.yaml') }}
          restore-keys: stack-cold-clone-
      - name: Confirm dist/haskell is absent on a fresh checkout
        run: |
          if [ -d dist/haskell ]; then
            echo "::error::dist/haskell/ exists on a fresh checkout — expected it to be gitignored post-#376."
            exit 1
          fi
          echo "confirmed: no committed dist/haskell/"
      # This is the #376 linchpin: seed every dist/haskell/<pkg>/ tree from
      # the committed dist/json/ using only published Hackage coders, with
      # dist/haskell/ absent going in. Same driver bin/sync.sh's own
      # cold-start detection calls; invoked directly here so this job's
      # failure signal is specific to the seed step, not buried inside a
      # full bin/sync.sh run.
      - name: Cold-seed dist/haskell from committed dist/json (published host)
        run: heads/haskell/json-driver/bin/cold-seed-dist-haskell.sh
      - name: Verify all 16 package trees were seeded
        run: |
          FAIL=0
          for pkg in $(python3 bin/lib/hydra-packages.py list); do
            if [ ! -d "dist/haskell/$pkg/src/main/haskell" ]; then
              echo "::error::missing seeded tree: dist/haskell/$pkg/src/main/haskell"
              FAIL=1
            fi
            if [ ! -f "dist/haskell/$pkg/package.yaml" ]; then
              echo "::error::missing seeded manifest: dist/haskell/$pkg/package.yaml"
              FAIL=1
            fi
          done
          test "$FAIL" = 0
      # With dist/haskell/hydra-kernel now seeded, bin/sync.sh's cold-start
      # sentinel check is satisfied and the rest of the pipeline runs exactly
      # as it would on a warm tree — proving the seeded output is not just
      # present but actually consumable by the full head build + test suite.
      - name: Full sync + stack test from the seeded tree
        run: bin/sync.sh --hosts haskell --targets haskell
      # Regression check: a full sync must never leave dist/haskell/ tracked
      # or trackable again. Checked AFTER the full sync above (not just after
      # the cold-seed step) because the failure mode this guards against is
      # something in the sync path disturbing .gitignore's working-tree
      # content after seeding, which a check immediately post-seed would miss.
      - name: Confirm dist/haskell/ is still gitignored after a full sync
        run: |
          if ! git check-ignore -q dist/haskell/hydra-kernel/src/main/haskell/Hydra/Adapt.hs; then
            echo "::error::dist/haskell/ is no longer gitignored after a full sync — #376 regression."
            exit 1
          fi
          echo "confirmed: dist/haskell/ still gitignored post-sync"
      - name: Verify Haskell distribution self-containment
        run: heads/haskell/bin/verify-distribution.sh

  java:
    name: Java tests
    needs: haskell
    runs-on: ubuntu-latest
    # Downstream per-host jobs download the Haskell job's dist artifacts and run
    # that host's tests — normally minutes. 45min is generous but bounds a hang.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      # JDK 17 is installed first (and captured via its step id) so the
      # distribution self-containment gate below can run on it; setup-java's
      # last invocation wins for JAVA_HOME, so JDK 11 is set up second and is
      # the default for the gradle test build.
      - id: jdk17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          # Pinned to 11.0.19 because newer 11.x patches (verified 11.0.31) regressed
          # generic varargs inference on the deeply-nested PersistentMap.ofEntries call
          # in dist/java/.../hydra/json/Bootstrap.java after #156 expanded
          # bootstrapTypeModules. Coder-level fix is the proper resolution.
          java-version: '11.0.19'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'heads/java/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - name: Download dist/java built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-java
          path: dist/java/
      - working-directory: heads/java
        run: ./gradlew :hydra-java:test
      # Self-containment gate: publish the per-package jars to a temp Maven repo
      # and resolve them from an offline consumer, so a published artifact that
      # is missing classes its API needs (or whose POM references a sibling not
      # in the publish set) fails here — the Java analog of #472 — before it
      # reaches Maven Central. Fails if the runner lacks a JDK 17+.
      - name: Verify Java distribution self-containment
        # Run on JDK 17 (the gradle publish plugins require it); the verifier
        # hard-fails below 17, so point JAVA_HOME/PATH at the JDK-17 install set
        # up above rather than the JDK-11 default used for the gradle test build.
        env:
          JAVA_HOME: ${{ steps.jdk17.outputs.path }}
        run: |
          export PATH="$JAVA_HOME/bin:$PATH"
          heads/java/bin/verify-distribution.sh

  python:
    name: Python tests
    needs: haskell
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v5
      - name: Download dist/python built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-python
          path: dist/python/
      - run: uv sync
        working-directory: heads/python
      - run: uv run pytest
        working-directory: heads/python
      # Packaging-boundary gate (#472): build the PyPI publish-set wheels from
      # the regenerated dist/python/ tree and import the kernel modules from a
      # clean, isolated venv. Catches the 0.16.0-class bug — a wheel that ships
      # code importing a package the wheel omits — on every push, not just at
      # release time. The Python tests above pass against the worktree on the
      # path; this step proves the WHEELS are self-contained.
      - name: Verify Python distribution self-containment (#472 gate)
        run: heads/python/bin/verify-distribution.sh

  clojure:
    name: Clojure tests
    needs: haskell
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: clojure-${{ hashFiles('heads/lisp/clojure/deps.edn') }}
          restore-keys: clojure-
      - name: Download dist/clojure built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-clojure
          path: dist/clojure/
      - run: packages/hydra-lisp/bin/run-tests.sh clojure

  scala:
    name: Scala tests
    needs: haskell
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install sbt
        run: |
          set -euo pipefail
          # Use signed-by keyring (modern pattern; apt-key is deprecated).
          # The GitHub Actions ubuntu-latest image doesn't ship dirmngr (so
          # `gpg --recv-keys` can't speak HKP), and `keys.openpgp.org`'s web
          # lookup endpoint serves HTML "not found" pages with 200 status for
          # unverified keys -- which an unconditional `curl | gpg --dearmor`
          # accepts and then fails on. So we curl the HTTP keyserver lookup
          # to a temp file, validate it really is an OpenPGP block before
          # importing, and try multiple keyservers in order.
          KEYID=2EE0EA64E40A89B84B2DF73499E82A75642AC823
          KEYRING=/etc/apt/keyrings/sbt.gpg
          sudo install -m 0755 -d /etc/apt/keyrings
          tmpkey=$(mktemp)

          fetched=0
          for ks in keyserver.ubuntu.com pgp.mit.edu keys.openpgp.org; do
            if curl -sSfL --max-time 30 \
                 "https://${ks}/pks/lookup?op=get&options=mr&search=0x${KEYID}" \
                 -o "$tmpkey" \
               && head -1 "$tmpkey" | grep -qF -- "-----BEGIN PGP PUBLIC KEY BLOCK-----"
            then
              echo "Fetched SBT signing key from ${ks}"
              fetched=1
              break
            fi
            echo "Keyserver ${ks} did not return an armored OpenPGP key; trying next..."
          done
          test "$fetched" -eq 1

          sudo gpg --dearmor -o "$KEYRING" < "$tmpkey"
          rm -f "$tmpkey"
          test -s "$KEYRING"

          echo "deb [signed-by=$KEYRING] https://repo.scala-sbt.org/scalasbt/debian all main" \
            | sudo tee /etc/apt/sources.list.d/sbt.list
          sudo apt-get update
          sudo apt-get install -y sbt
      - uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
          key: sbt-${{ hashFiles('packages/hydra-scala/build.sbt', 'packages/hydra-scala/project/build.properties') }}
          restore-keys: sbt-
      - name: Download dist/scala built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-scala
          path: dist/scala/
      - run: sbt test
        working-directory: packages/hydra-scala
      # Self-containment gate: publish the per-package artifacts to a temp Ivy
      # repo and resolve them from an offline consumer, so a published jar that
      # is missing classes its API needs (or whose POM references a sibling not
      # in the publish set) fails here — the Scala analog of #472/#519 — before
      # it reaches Maven Central. See #537.
      - name: Verify Scala distribution self-containment
        run: heads/scala/bin/verify-distribution.sh

  # #571: TypeScript is a self-hosting host (per CLAUDE.md) and is gated here
  # like every other host. Both steps were initially non-blocking pending a
  # coder-side definition-ordering bug (#604: `alternation` emitted before the
  # `regexSequence` const it depends on, TS2448). That bug is fixed on main by
  # 41a9fe8192 ("Fix TS coder const-ordering to ignore lambda-guarded
  # references"), so the guards are removed and TypeScript now blocks on
  # failure. The two earlier blockers this job was drafted against (#570
  # hydra.test.build.* not emitted; #578 verify-distribution.sh smoke-test
  # import doubling) were already fixed.
  typescript:
    name: TypeScript tests
    needs: haskell
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Download dist/typescript built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-typescript
          path: dist/typescript/
      - name: Run TypeScript distribution tests
        run: heads/typescript/bin/test-distribution.sh hydra-kernel
      # Self-containment gate: pack the npm publish-set packages from dist/
      # and verify a clean install resolves the kernel's core module, so a
      # published tarball missing files fails here — the TS analog of
      # #472/#519/#537 — before it reaches npm.
      - name: Verify TypeScript distribution self-containment
        run: heads/typescript/bin/verify-distribution.sh

  common-lisp:
    name: Common Lisp tests
    needs: haskell
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install SBCL and cl-ppcre
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl cl-ppcre
      - name: Download dist/common-lisp built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-common-lisp
          path: dist/common-lisp/
      - run: packages/hydra-lisp/bin/run-tests.sh common-lisp

  scheme:
    name: Scheme tests
    needs: haskell
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install Guile
        run: |
          sudo apt-get update
          sudo apt-get install -y guile-3.0
      - name: Download dist/scheme built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-scheme
          path: dist/scheme/
      - run: packages/hydra-lisp/bin/run-tests.sh scheme

  emacs-lisp:
    name: Emacs Lisp tests
    needs: haskell
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install Emacs
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox
      - name: Download dist/emacs-lisp built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-emacs-lisp
          path: dist/emacs-lisp/
      - run: packages/hydra-lisp/bin/run-tests.sh emacs-lisp
