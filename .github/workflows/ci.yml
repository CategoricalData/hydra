name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI model, per feature_290_packaging:
#
#   * The Haskell job is the "JSON build". It regenerates dist/json/ from
#     DSL sources, regenerates dist/haskell/ from the JSON, runs stack
#     test, and fails if the regenerated tree differs from what's
#     committed. This is the only job that exercises DSL -> JSON
#     inference and Haskell code generation.
#
#   * Every other target job assumes dist/json/ is canonical (committed
#     in the repo). They run the target's assemble-distribution plus
#     test-distribution scripts against the committed JSON. They do not
#     run Phase 1 (DSL -> JSON) themselves; that's the Haskell job's
#     responsibility.
#
# This matches integration's de-facto CI topology: one expensive job
# producing JSON + checking consistency; cheap jobs consuming JSON and
# running target-language tests.

jobs:
  haskell:
    name: Haskell tests (JSON build + consistency check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.stack
          key: stack-${{ hashFiles('heads/haskell/stack.yaml', 'heads/haskell/package.yaml') }}
          restore-keys: stack-
      # Regenerate dist/json/ from DSL sources (Phase 1, batch mode) and
      # dist/haskell/ from the JSON (Phase 2 haskell target, per-package).
      # Any drift from the committed tree fails the job.
      - name: Regenerate JSON and Haskell from DSL sources
        run: |
          bin/sync.sh --hosts haskell --targets haskell --no-tests
      - name: Fail if generated files differ from committed
        run: |
          if ! git diff --quiet dist/json/ dist/haskell/; then
            echo "::error::Generated files (dist/json/ and/or dist/haskell/) differ from the committed tree."
            echo "::error::Run bin/sync.sh --hosts haskell --targets haskell locally and commit the result."
            git diff --stat dist/json/ dist/haskell/
            exit 1
          fi
      - name: Stack tests
        run: stack test
        working-directory: heads/haskell

  java:
    name: Java tests
    needs: haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - run: ./gradlew :hydra-java:test

  python:
    name: Python tests
    needs: haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
        working-directory: heads/python
      - run: uv run pytest
        working-directory: heads/python

  clojure:
    name: Clojure tests
    needs: haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: clojure-${{ hashFiles('heads/lisp/clojure/deps.edn') }}
          restore-keys: clojure-
      - run: packages/hydra-lisp/bin/run-tests.sh clojure

  scala:
    name: Scala tests
    needs: haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install sbt
        run: |
          echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list
          curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" | sudo apt-key add
          sudo apt-get update
          sudo apt-get install -y sbt
      - uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
          key: sbt-${{ hashFiles('packages/hydra-scala/build.sbt', 'packages/hydra-scala/project/build.properties') }}
          restore-keys: sbt-
      - run: sbt test
        working-directory: packages/hydra-scala

  common-lisp:
    name: Common Lisp tests
    needs: haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SBCL and cl-ppcre
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl cl-ppcre
      - run: packages/hydra-lisp/bin/run-tests.sh common-lisp

  scheme:
    name: Scheme tests
    needs: haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Guile
        run: |
          sudo apt-get update
          sudo apt-get install -y guile-3.0
      - run: packages/hydra-lisp/bin/run-tests.sh scheme
