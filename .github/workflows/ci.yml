name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI model, per feature_290_packaging:
#
#   * The Haskell job is the "JSON build". It regenerates dist/json/
#     from DSL sources, regenerates dist/<lang>/ for every target from
#     the JSON, runs stack test, and fails if the regenerated dist/json/
#     or dist/haskell/ differ from what's committed (those are the two
#     trees tracked in git; other dist/<lang>/ trees are gitignored and
#     only built for downstream consumption).
#
#   * The regenerated dist/<lang>/ trees for java, python, scala, and
#     each Lisp dialect are uploaded as build artifacts so the target
#     jobs below can run tests against them without needing to install
#     Stack + GHC or rebuild the Hydra library themselves.
#
#   * Every other target job downloads its dist artifact and runs its
#     native test suite. They do not run Phase 1 (DSL -> JSON) or
#     Phase 2 (JSON -> target source) themselves; that's the Haskell
#     job's responsibility.
#
# This matches integration's de-facto CI topology: one expensive job
# producing JSON + all target source trees; cheap jobs consuming those
# and running target-language tests.

jobs:
  haskell:
    name: Haskell tests (JSON build + consistency check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: latest
      # uv is required by bin/generate-hydra-python-from-python.sh (Phase 5
      # native Python self-host, default INTERP=uv) which runs as part of
      # the sync step below.
      - uses: astral-sh/setup-uv@v5
      - uses: actions/cache@v4
        with:
          path: ~/.stack
          key: stack-${{ hashFiles('heads/haskell/stack.yaml', 'heads/haskell/package.yaml') }}
          restore-keys: stack-
      # Regenerate dist/json/ from DSL sources (Phase 1, batch mode)
      # and dist/<lang>/ for every target from the JSON (Phase 2,
      # per-package). Any drift from the committed dist/json/ or
      # dist/haskell/ tree fails the job.
      - name: Regenerate JSON and all target dists from DSL sources
        run: |
          bin/sync.sh --hosts all --targets all --no-tests
      # The bootstrapping matrix above intentionally skips the "on-
      # demand" packages (hydra-pg, hydra-rdf, hydra-ext). The Java
      # host's checked-in sources (packages/hydra-java/src/main/java/
      # hydra/pg/**, hydra/rdf/**) import from these dist/java subtrees,
      # so the Java CI job below can't compile without them. Generate
      # them into the target languages that need them. Python's
      # pythonpath also references these trees, though Python silently
      # skips missing entries; generating for hygiene.
      - name: Regenerate on-demand packages (hydra-pg, hydra-rdf, hydra-ext)
        run: |
          for pkg in hydra-pg hydra-rdf hydra-ext; do
            for tgt in java python; do
              bin/sync-packages.sh "$pkg" --targets "$tgt" --no-tests
            done
          done
      # #469: pointed guard for the native-coder JSON->Haskell render gate.
      # Forces a cache miss by deleting the per-package output digest,
      # re-runs the assembler against committed JSON, and fails on any
      # diff. Catches the recurrence pattern where Phase 5 short-circuits
      # but the .hs is stale w.r.t. committed dist/json — the gap closed
      # by the digest schema change in this PR. Independent from the
      # broader dist-diff check below: if that one passes, this is a
      # no-op redundancy; if not, this points at the specific package.
      - name: Force-regen and diff dist/haskell/hydra-{java,python}
        run: |
          set -e
          for pkg in hydra-java hydra-python; do
            rm -f "dist/haskell/$pkg/build/main/digest.json"
            heads/haskell/bin/assemble-distribution.sh "$pkg"
            if ! git diff --quiet "dist/haskell/$pkg/"; then
              echo "::error::dist/haskell/$pkg/ differs after force-regen from committed dist/json/$pkg/."
              echo "::error::The committed .hs is stale w.r.t. the committed JSON for this native-coder package."
              git diff --stat "dist/haskell/$pkg/"
              git diff "dist/haskell/$pkg/" | head -100
              exit 1
            fi
          done
      - name: Fail if committed dist/json or dist/haskell differs from regenerated
        run: |
          if ! git diff --quiet dist/json/ dist/haskell/; then
            echo "::error::Generated files (dist/json/ and/or dist/haskell/) differ from the committed tree."
            echo "::error::Run bin/sync.sh locally and commit the result."
            git diff --stat dist/json/ dist/haskell/
            exit 1
          fi
      - name: Stack tests
        run: stack test
        working-directory: heads/haskell
      # Self-containment gate: stage the per-package distributions into one
      # stack project and build them as published, so a package that references
      # something present only in heads/ (not in dist/) fails here — the #473
      # cold-build class of bug — before it reaches Hackage.
      - name: Verify Haskell distribution self-containment
        run: heads/haskell/bin/verify-distribution.sh
      # Upload dist/<lang>/ trees for downstream target jobs. One
      # artifact per target so each job only pays for its own download.
      - name: Upload dist/java
        uses: actions/upload-artifact@v4
        with:
          name: dist-java
          path: dist/java/
          retention-days: 1
      - name: Upload dist/python
        uses: actions/upload-artifact@v4
        with:
          name: dist-python
          path: dist/python/
          retention-days: 1
      - name: Upload dist/scala
        uses: actions/upload-artifact@v4
        with:
          name: dist-scala
          path: dist/scala/
          retention-days: 1
      - name: Upload dist/clojure
        uses: actions/upload-artifact@v4
        with:
          name: dist-clojure
          path: dist/clojure/
          retention-days: 1
      - name: Upload dist/common-lisp
        uses: actions/upload-artifact@v4
        with:
          name: dist-common-lisp
          path: dist/common-lisp/
          retention-days: 1
      - name: Upload dist/scheme
        uses: actions/upload-artifact@v4
        with:
          name: dist-scheme
          path: dist/scheme/
          retention-days: 1
      - name: Upload dist/emacs-lisp
        uses: actions/upload-artifact@v4
        with:
          name: dist-emacs-lisp
          path: dist/emacs-lisp/
          retention-days: 1

  java:
    name: Java tests
    needs: haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # JDK 17 is installed first (and captured via its step id) so the
      # distribution self-containment gate below can run on it; setup-java's
      # last invocation wins for JAVA_HOME, so JDK 11 is set up second and is
      # the default for the gradle test build.
      - id: jdk17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          # Pinned to 11.0.19 because newer 11.x patches (verified 11.0.31) regressed
          # generic varargs inference on the deeply-nested PersistentMap.ofEntries call
          # in dist/java/.../hydra/json/Bootstrap.java after #156 expanded
          # bootstrapTypeModules. Coder-level fix is the proper resolution.
          java-version: '11.0.19'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'heads/java/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - name: Download dist/java built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-java
          path: dist/java/
      - working-directory: heads/java
        run: ./gradlew :hydra-java:test
      # Self-containment gate: publish the per-package jars to a temp Maven repo
      # and resolve them from an offline consumer, so a published artifact that
      # is missing classes its API needs (or whose POM references a sibling not
      # in the publish set) fails here — the Java analog of #472 — before it
      # reaches Maven Central. Fails if the runner lacks a JDK 17+.
      - name: Verify Java distribution self-containment
        # Run on JDK 17 (the gradle publish plugins require it); the verifier
        # hard-fails below 17, so point JAVA_HOME/PATH at the JDK-17 install set
        # up above rather than the JDK-11 default used for the gradle test build.
        env:
          JAVA_HOME: ${{ steps.jdk17.outputs.path }}
        run: |
          export PATH="$JAVA_HOME/bin:$PATH"
          heads/java/bin/verify-distribution.sh

  python:
    name: Python tests
    needs: haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v5
      - name: Download dist/python built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-python
          path: dist/python/
      - run: uv sync
        working-directory: heads/python
      - run: uv run pytest
        working-directory: heads/python
      # Packaging-boundary gate (#472): build the PyPI publish-set wheels from
      # the regenerated dist/python/ tree and import the kernel modules from a
      # clean, isolated venv. Catches the 0.16.0-class bug — a wheel that ships
      # code importing a package the wheel omits — on every push, not just at
      # release time. The Python tests above pass against the worktree on the
      # path; this step proves the WHEELS are self-contained.
      - name: Verify Python distribution self-containment (#472 gate)
        run: heads/python/bin/verify-distribution.sh

  clojure:
    name: Clojure tests
    needs: haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: clojure-${{ hashFiles('heads/lisp/clojure/deps.edn') }}
          restore-keys: clojure-
      - name: Download dist/clojure built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-clojure
          path: dist/clojure/
      - run: packages/hydra-lisp/bin/run-tests.sh clojure

  scala:
    name: Scala tests
    needs: haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install sbt
        run: |
          set -euo pipefail
          # Use signed-by keyring (modern pattern; apt-key is deprecated).
          # The GitHub Actions ubuntu-latest image doesn't ship dirmngr (so
          # `gpg --recv-keys` can't speak HKP), and `keys.openpgp.org`'s web
          # lookup endpoint serves HTML "not found" pages with 200 status for
          # unverified keys -- which an unconditional `curl | gpg --dearmor`
          # accepts and then fails on. So we curl the HTTP keyserver lookup
          # to a temp file, validate it really is an OpenPGP block before
          # importing, and try multiple keyservers in order.
          KEYID=2EE0EA64E40A89B84B2DF73499E82A75642AC823
          KEYRING=/etc/apt/keyrings/sbt.gpg
          sudo install -m 0755 -d /etc/apt/keyrings
          tmpkey=$(mktemp)

          fetched=0
          for ks in keyserver.ubuntu.com pgp.mit.edu keys.openpgp.org; do
            if curl -sSfL --max-time 30 \
                 "https://${ks}/pks/lookup?op=get&options=mr&search=0x${KEYID}" \
                 -o "$tmpkey" \
               && head -1 "$tmpkey" | grep -qF -- "-----BEGIN PGP PUBLIC KEY BLOCK-----"
            then
              echo "Fetched SBT signing key from ${ks}"
              fetched=1
              break
            fi
            echo "Keyserver ${ks} did not return an armored OpenPGP key; trying next..."
          done
          test "$fetched" -eq 1

          sudo gpg --dearmor -o "$KEYRING" < "$tmpkey"
          rm -f "$tmpkey"
          test -s "$KEYRING"

          echo "deb [signed-by=$KEYRING] https://repo.scala-sbt.org/scalasbt/debian all main" \
            | sudo tee /etc/apt/sources.list.d/sbt.list
          sudo apt-get update
          sudo apt-get install -y sbt
      - uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
          key: sbt-${{ hashFiles('packages/hydra-scala/build.sbt', 'packages/hydra-scala/project/build.properties') }}
          restore-keys: sbt-
      - name: Download dist/scala built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-scala
          path: dist/scala/
      - run: sbt test
        working-directory: packages/hydra-scala
      # Self-containment gate: publish the per-package artifacts to a temp Ivy
      # repo and resolve them from an offline consumer, so a published jar that
      # is missing classes its API needs (or whose POM references a sibling not
      # in the publish set) fails here — the Scala analog of #472/#519 — before
      # it reaches Maven Central. See #537.
      - name: Verify Scala distribution self-containment
        run: heads/scala/bin/verify-distribution.sh

  common-lisp:
    name: Common Lisp tests
    needs: haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SBCL and cl-ppcre
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl cl-ppcre
      - name: Download dist/common-lisp built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-common-lisp
          path: dist/common-lisp/
      - run: packages/hydra-lisp/bin/run-tests.sh common-lisp

  scheme:
    name: Scheme tests
    needs: haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Guile
        run: |
          sudo apt-get update
          sudo apt-get install -y guile-3.0
      - name: Download dist/scheme built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-scheme
          path: dist/scheme/
      - run: packages/hydra-lisp/bin/run-tests.sh scheme

  emacs-lisp:
    name: Emacs Lisp tests
    needs: haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Emacs
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox
      - name: Download dist/emacs-lisp built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-emacs-lisp
          path: dist/emacs-lisp/
      - run: packages/hydra-lisp/bin/run-tests.sh emacs-lisp
