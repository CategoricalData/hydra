name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  haskell:
    name: Haskell tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.stack
          key: stack-${{ hashFiles('heads/haskell/stack.yaml', 'heads/haskell/package.yaml') }}
          restore-keys: stack-
      - run: stack test --install-ghc
        working-directory: heads/haskell

  java:
    name: Java tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - run: ./gradlew :hydra-java:test

  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
        working-directory: packages/hydra-python
      - run: uv run pytest
        working-directory: packages/hydra-python

  clojure:
    name: Clojure tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: clojure-${{ hashFiles('packages/hydra-lisp/hydra-clojure/deps.edn') }}
          restore-keys: clojure-
      - run: bash run-tests.sh
        working-directory: packages/hydra-lisp/hydra-clojure

  scala:
    name: Scala tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install sbt
        run: |
          echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list
          curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" | sudo apt-key add
          sudo apt-get update
          sudo apt-get install -y sbt
      - uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
          key: sbt-${{ hashFiles('packages/hydra-scala/build.sbt', 'packages/hydra-scala/project/build.properties') }}
          restore-keys: sbt-
      - run: sbt test
        working-directory: packages/hydra-scala

  common-lisp:
    name: Common Lisp tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SBCL and cl-ppcre
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl cl-ppcre
      - run: bash run-tests.sh
        working-directory: packages/hydra-lisp/hydra-common-lisp
