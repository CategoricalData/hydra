name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  haskell:
    name: Haskell tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.stack
          key: stack-${{ hashFiles('hydra-haskell/stack.yaml', 'hydra-haskell/package.yaml') }}
          restore-keys: stack-
      - run: stack test --install-ghc
        working-directory: hydra-haskell

  java:
    name: Java tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - run: ./gradlew :hydra-java:test

  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
        working-directory: hydra-python
      - run: uv run pytest
        working-directory: hydra-python
