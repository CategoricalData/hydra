name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI model, per feature_290_packaging:
#
#   * The Haskell job is the "JSON build". It regenerates dist/json/
#     from DSL sources, regenerates dist/<lang>/ for every target from
#     the JSON, runs stack test, and fails if the regenerated dist/json/
#     or dist/haskell/ differ from what's committed (those are the two
#     trees tracked in git; other dist/<lang>/ trees are gitignored and
#     only built for downstream consumption).
#
#   * The regenerated dist/<lang>/ trees for java, python, scala, and
#     each Lisp dialect are uploaded as build artifacts so the target
#     jobs below can run tests against them without needing to install
#     Stack + GHC or rebuild the Hydra library themselves.
#
#   * Every other target job downloads its dist artifact and runs its
#     native test suite. They do not run Phase 1 (DSL -> JSON) or
#     Phase 2 (JSON -> target source) themselves; that's the Haskell
#     job's responsibility.
#
# This matches integration's de-facto CI topology: one expensive job
# producing JSON + all target source trees; cheap jobs consuming those
# and running target-language tests.

jobs:
  haskell:
    name: Haskell tests (JSON build + consistency check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.stack
          key: stack-${{ hashFiles('heads/haskell/stack.yaml', 'heads/haskell/package.yaml') }}
          restore-keys: stack-
      # Regenerate dist/json/ from DSL sources (Phase 1, batch mode)
      # and dist/<lang>/ for every target from the JSON (Phase 2,
      # per-package). Any drift from the committed dist/json/ or
      # dist/haskell/ tree fails the job.
      - name: Regenerate JSON and all target dists from DSL sources
        run: |
          bin/sync.sh --hosts all --targets all --no-tests
      # The bootstrapping matrix above intentionally skips the "on-
      # demand" packages (hydra-pg, hydra-rdf, hydra-ext). The Java
      # host's checked-in sources (packages/hydra-java/src/main/java/
      # hydra/pg/**, hydra/rdf/**) import from these dist/java subtrees,
      # so the Java CI job below can't compile without them. Generate
      # them into the target languages that need them. Python's
      # pythonpath also references these trees, though Python silently
      # skips missing entries; generating for hygiene.
      - name: Regenerate on-demand packages (hydra-pg, hydra-rdf, hydra-ext)
        run: |
          for pkg in hydra-pg hydra-rdf hydra-ext; do
            for tgt in java python; do
              bin/sync-packages.sh "$pkg" --target "$tgt" --no-tests
            done
          done
      - name: Fail if committed dist/json or dist/haskell differs from regenerated
        run: |
          if ! git diff --quiet dist/json/ dist/haskell/; then
            echo "::error::Generated files (dist/json/ and/or dist/haskell/) differ from the committed tree."
            echo "::error::Run bin/sync.sh locally and commit the result."
            git diff --stat dist/json/ dist/haskell/
            exit 1
          fi
      - name: Stack tests
        run: stack test
        working-directory: heads/haskell
      # Upload dist/<lang>/ trees for downstream target jobs. One
      # artifact per target so each job only pays for its own download.
      - name: Upload dist/java
        uses: actions/upload-artifact@v4
        with:
          name: dist-java
          path: dist/java/
          retention-days: 1
      - name: Upload dist/python
        uses: actions/upload-artifact@v4
        with:
          name: dist-python
          path: dist/python/
          retention-days: 1
      - name: Upload dist/scala
        uses: actions/upload-artifact@v4
        with:
          name: dist-scala
          path: dist/scala/
          retention-days: 1
      - name: Upload dist/clojure
        uses: actions/upload-artifact@v4
        with:
          name: dist-clojure
          path: dist/clojure/
          retention-days: 1
      - name: Upload dist/common-lisp
        uses: actions/upload-artifact@v4
        with:
          name: dist-common-lisp
          path: dist/common-lisp/
          retention-days: 1
      - name: Upload dist/scheme
        uses: actions/upload-artifact@v4
        with:
          name: dist-scheme
          path: dist/scheme/
          retention-days: 1

  java:
    name: Java tests
    needs: haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - name: Download dist/java built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-java
          path: dist/java/
      - run: ./gradlew :hydra-java:test

  python:
    name: Python tests
    needs: haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v5
      - name: Download dist/python built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-python
          path: dist/python/
      - run: uv sync
        working-directory: heads/python
      - run: uv run pytest
        working-directory: heads/python

  clojure:
    name: Clojure tests
    needs: haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: clojure-${{ hashFiles('heads/lisp/clojure/deps.edn') }}
          restore-keys: clojure-
      - name: Download dist/clojure built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-clojure
          path: dist/clojure/
      - run: packages/hydra-lisp/bin/run-tests.sh clojure

  scala:
    name: Scala tests
    needs: haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install sbt
        run: |
          echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list
          curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" | sudo apt-key add
          sudo apt-get update
          sudo apt-get install -y sbt
      - uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier
          key: sbt-${{ hashFiles('packages/hydra-scala/build.sbt', 'packages/hydra-scala/project/build.properties') }}
          restore-keys: sbt-
      - name: Download dist/scala built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-scala
          path: dist/scala/
      - run: sbt test
        working-directory: packages/hydra-scala

  common-lisp:
    name: Common Lisp tests
    needs: haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SBCL and cl-ppcre
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl cl-ppcre
      - name: Download dist/common-lisp built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-common-lisp
          path: dist/common-lisp/
      - run: packages/hydra-lisp/bin/run-tests.sh common-lisp

  scheme:
    name: Scheme tests
    needs: haskell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Guile
        run: |
          sudo apt-get update
          sudo apt-get install -y guile-3.0
      - name: Download dist/scheme built by Haskell job
        uses: actions/download-artifact@v4
        with:
          name: dist-scheme
          path: dist/scheme/
      - run: packages/hydra-lisp/bin/run-tests.sh scheme
