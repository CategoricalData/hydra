name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  haskell:
    name: Haskell tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.stack
          key: stack-${{ hashFiles('hydra-haskell/stack.yaml', 'hydra-haskell/package.yaml') }}
          restore-keys: stack-
      - run: stack test --install-ghc
        working-directory: hydra-haskell

  java:
    name: Java tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - run: ./gradlew :hydra-java:test

  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
        working-directory: hydra-python
      - run: uv run pytest
        working-directory: hydra-python

  clojure:
    name: Clojure tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@v14
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: clojure-${{ hashFiles('hydra-lisp/hydra-clojure/deps.edn') }}
          restore-keys: clojure-
      - run: bash run-tests.sh
        working-directory: hydra-lisp/hydra-clojure

  common-lisp:
    name: Common Lisp tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SBCL and cl-ppcre
        run: |
          sudo apt-get update
          sudo apt-get install -y sbcl cl-ppcre
      - run: bash run-tests.sh
        working-directory: hydra-lisp/hydra-common-lisp
