name: Deploy docs to GitHub Pages

on:
  push:
    tags: ['*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # JDK 17+ is required: the published dist/java/<pkg>/ builds use the nmcp
      # plugin, which the init script + javadoc path pull in.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'heads/java/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # After the #418 per-package split, the compilable + javadoc-able Java lives
      # in dist/java/<pkg>/, each depending on `net.fortytwo.hydra:hydra-kernel`.
      # JavaDoc on hydra-java therefore needs the kernel resolvable: publish it to
      # the local Maven repo first. The init script makes Javadoc non-fatal — the
      # generated code carries cosmetic javadoc issues (unqualified @link refs #449,
      # bad-HTML-entity warnings) that would otherwise fail the strict task; the
      # generated build stays strict by default, this lenience is for Pages only.
      # hydra-ext is excluded (not in the Java build / Maven publish set); restore
      # it here when hydra-ext is published to Maven Central.
      - name: Generate JavaDocs
        env:
          INIT: ${{ github.workspace }}/heads/java/bin/javadoc-nonfatal.init.gradle
        run: |
          ( cd dist/java/hydra-kernel && gradle publishToMavenLocal -x test --init-script "$INIT" )
          ( cd dist/java/hydra-java   && gradle javadoc --refresh-dependencies --init-script "$INIT" )

      - name: Assemble site
        run: |
          mkdir -p _site/hydra-java/javadoc
          cp docs/index.html _site/
          cp -r dist/java/hydra-java/build/docs/javadoc/* _site/hydra-java/javadoc/

      - uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
