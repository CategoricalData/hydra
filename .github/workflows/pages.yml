name: Deploy docs to GitHub Pages

on:
  push:
    tags: ['*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Generate JavaDocs
        run: ./gradlew :hydra-java:javadoc :hydra-ext:javadoc

      - name: Assemble site
        run: |
          mkdir -p _site/hydra-java/javadoc _site/hydra-ext/javadoc
          cp docs/index.html _site/
          cp -r hydra-java/build/docs/javadoc/* _site/hydra-java/javadoc/
          cp -r hydra-ext/build/docs/javadoc/* _site/hydra-ext/javadoc/

      - uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
