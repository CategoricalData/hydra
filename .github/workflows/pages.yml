name: Deploy docs to GitHub Pages

on:
  push:
    tags: ['*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', 'heads/java/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # hydra-ext is excluded from the Java build (and thus JavaDoc) pending the
      # Java-coder limitation that keeps it out of the Maven Central publish set;
      # restore :hydra-ext:javadoc here when hydra-ext is published to Maven Central.
      # The init script makes Javadoc non-fatal: generated code carries cosmetic
      # javadoc issues (unqualified @link refs #449, bad-HTML-entity warnings) that
      # would otherwise fail the strict javadoc task. The generated build stays
      # strict by default; this lenience applies to the Pages build only.
      - name: Generate JavaDocs
        working-directory: heads/java
        run: ./gradlew :hydra-java:javadoc --init-script bin/javadoc-nonfatal.init.gradle

      - name: Assemble site
        run: |
          mkdir -p _site/hydra-java/javadoc
          cp docs/index.html _site/
          cp -r packages/hydra-java/build/docs/javadoc/* _site/hydra-java/javadoc/

      - uses: actions/upload-pages-artifact@v3

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
