name:         hydra
version:      0.12.0
author:       Joshua Shinavier <josh@fortytwo.net>
license:      Apache-2.0
license-file: LICENSE
category:     Data
synopsis:     Graph programming language (bootstrapped)
description:  >
  Bootstrapped Hydra — generated from JSON modules by a non-Haskell host.
github:       CategoricalData/hydra

extra-source-files:
  - LICENSE
  - README.md
  - stack.yaml

dependencies:
  - HsYAML                        >= 0.2.1 && < 0.3
  - aeson                         >= 2.2.0 && < 2.3
  - base                          >= 4.20.0 && < 4.21
  - base64-bytestring             >= 1.2.1 && < 1.3
  - bytestring                    >= 0.12.0 && < 0.13
  - containers                    >= 0.7 && < 0.8
  - directory                     >= 1.3.6 && < 1.4
  - filepath                      >= 1.5.0 && < 1.6
  - scientific                    >= 0.3.7 && < 0.4
  - split                         >= 0.2.3 && < 0.3
  - text                          >= 2.1.0 && < 2.2
  - vector                        >= 0.12.0 && < 0.14

library:
  source-dirs:
    - src/main/haskell
    - src/gen-main/haskell

tests:
  hydra-test:
    main: Spec.hs
    source-dirs:
      - src/test/haskell
      - src/gen-test/haskell
    dependencies:
      - hydra
      - hspec
      - hspec-discover
      - HUnit
      - QuickCheck
      - mtl
