name:         hydra
version:      0.14.0
author:       Joshua Shinavier <josh@fortytwo.net>
license:      Apache-2.0
license-file: LICENSE
category:     Data
synopsis:     Graph programming language
description:  >
  Hydra is an implementation of the LambdaGraph data model, which takes advantage of an isomorphism
  between labeled hypergraphs and typed lambda calculus: in Hydra, "graphs are programs, and programs are graphs".
  The language is designed to be embedded in other programming languages -- currently Haskell, Java, and Python.
  Hydra transforms data, schemas, and functional programs into multiple other languages in a way which maintains type safety.
  It is self-hosting in Haskell -- it generates its own executable source code from Hydra sources -- and it is
  designed to become self-hosting in its other implementation languages, as well.
github:       CategoricalData/hydra

extra-source-files:
  - LICENSE
  - README.md
  - stack.yaml

dependencies:
  - aeson                         >= 2.1.0 && < 2.3
  - base                          >= 4.19.0 && < 4.22
  - base64-bytestring             >= 1.2.1 && < 1.3
  - bytestring                    >= 0.11.5 && < 0.13
  - containers                    >= 0.6.7 && < 0.8
  - directory                     >= 1.3.6 && < 1.4
  - filepath                      >= 1.4.200 && < 1.6
  - scientific                    >= 0.3.7 && < 0.4
  - split                         >= 0.2.3 && < 0.3
  - text                          >= 2.0.2 && < 2.2
  - vector                        >= 0.12.0 && < 0.14

library:
  source-dirs:
    - src/main/haskell
    - src/gen-main/haskell

executables:
  update-generation-tests:
    main: Main.hs
    source-dirs:
      - src/exec/update-generation-tests
      - src/gen-test/haskell
    ghc-options: [-rtsopts]
    dependencies:
      - hydra
      - hspec                      >= 2.11.0 && < 2.12

  update-kernel-tests:
    main: Main.hs
    source-dirs:
      - src/exec/update-kernel-tests
      - src/gen-test/haskell
    ghc-options: [-rtsopts]
    dependencies:
      - hydra
      - hspec                      >= 2.11.0 && < 2.12

  update-json-kernel:
    main: Main.hs
    source-dirs:
      - src/exec/update-json-kernel
    ghc-options: [-rtsopts]
    dependencies:
      - hydra

  update-json-main:
    main: Main.hs
    source-dirs:
      - src/exec/update-json-main
    ghc-options: [-rtsopts]
    dependencies:
      - hydra

  update-json-test:
    main: Main.hs
    source-dirs:
      - src/exec/update-json-test
    ghc-options: [-rtsopts]
    dependencies:
      - hydra

  update-json-manifest:
    main: Main.hs
    source-dirs:
      - src/exec/update-json-manifest
    ghc-options: [-rtsopts]
    dependencies:
      - hydra

  update-haskell-kernel:
    main: Main.hs
    source-dirs:
      - src/exec/update-haskell-kernel
    ghc-options: [-rtsopts]
    dependencies:
      - hydra

  update-haskell-eval-lib:
    main: Main.hs
    source-dirs:
      - src/exec/update-haskell-eval-lib
    ghc-options: [-rtsopts]
    dependencies:
      - hydra

  update-haskell-sources:
    main: Main.hs
    source-dirs:
      - src/exec/update-haskell-sources
    ghc-options: [-rtsopts]
    dependencies:
      - hydra

  verify-json-kernel:
    main: Main.hs
    source-dirs:
      - src/exec/verify-json-kernel
    ghc-options: [-rtsopts]
    dependencies:
      - hydra

tests:
  hydra-test:
    main: Spec.hs
    source-dirs:
      - src/test/haskell
      - src/gen-test/haskell
    dependencies:
      - hydra
      - hspec                      >= 2.11.0 && < 2.12
      - hspec-discover              >= 2.11.0 && < 2.12
      - HUnit
      - QuickCheck
      - mtl # For the Algorithm W reference implementation
      - process # For git metadata in benchmark output
      - time # For timestamps in benchmark output
