# Standalone #376 cold-only published-host DSL->dist seeder. See stack.yaml for
# rationale. Compiles a haskell-target-ONLY seeder (app/ColdSeedMain.hs) + the
# head's coder-agnostic generation modules — against the PUBLISHED Hydra packages
# (stack.yaml extra-deps, pinned at 0.17.1). It links ONLY published coders and
# never imports the unpublished ext/coq/wasm/go/bench coders; it still SEEDS all
# 16 dist/haskell source trees from dist/json (they are loaded as JSON and
# rendered via the Haskell coder).
#
# #608 (oil and water): the seeder does NOT source-dir HEAD's kernel/haskell Terms
# authoring tree. Compiling packages/hydra-{kernel,haskell}/src/main/haskell while
# also linking the published hydra-kernel was the oil-and-water violation — HEAD's
# Terms DSL is phantom-annotated with kernel types that may not exist in the
# published kernel yet (e.g. MissingCaseBranchesError, #598), giving "Not in scope"
# on every new-kernel-type PR. The seeder needs those Sources only as a JSON
# DECODE-universe context, which requires TYPE definitions only; ColdSeedMain now
# obtains that context from the Terms-free Hydra.Sources.Kernel.Types.All
# (kernelTypesModules). Only that Terms-free Types subtree is source-dir'd (copied
# into typesmods/ by bin/cold-seed-dist-haskell.sh), and it compiles against ANY
# published hydra-kernel. See the import comment in app/ColdSeedMain.hs and the
# typesmods/ source-dir comment below.
name:         hydra-json-driver
version:      0.17.1
author:       Joshua Shinavier <josh@fortytwo.net>
license:      Apache-2.0
category:     Data
synopsis:     "Standalone cold-only published-host seeder that seeds dist/haskell from dist/json (#376)"
github:       CategoricalData/hydra

dependencies:
  - base                          >= 4.19.0 && < 4.22
  - aeson                         >= 2.2.0 && < 2.3
  - bytestring                    >= 0.11.5 && < 0.13
  - containers                    >= 0.6.7 && < 0.8
  - directory                     >= 1.3.6 && < 1.4
  - filepath                      >= 1.4.200 && < 1.6
  - regex-tdfa                    >= 1.3.2 && < 1.4
  - scientific                    >= 0.3.7 && < 0.4
  - SHA                           >= 1.6.4 && < 1.7
  - split                         >= 0.2.3 && < 0.3
  - text                          >= 2.0 && < 2.2
  - time                          >= 1.12.0 && < 1.13
  - vector                        >= 0.13 && < 0.14
  # Published Hydra packages (from Hackage; pinned in stack.yaml @0.17.1).
  # ONLY the packages published at 0.17.1 — NOT hydra-{go,coq,wasm,ext,bench},
  # which #589 deliberately excludes from Hackage (no buildable sdists). The
  # cold seeder does not link their coders; their dist/haskell source is still
  # seeded from JSON via the Haskell coder.
  #
  # #608: hydra-kernel / hydra-haskell stay here as ordinary published deps.
  # The seeder links their published generated code (kernel types + Haskell
  # coder). It does NOT source-dir their HEAD Terms authoring tree — that
  # combination was the oil-and-water violation (see the header comment).
  - hydra-kernel
  - hydra-haskell
  - hydra-java
  - hydra-jvm
  - hydra-python
  - hydra-scala
  - hydra-typescript
  - hydra-lisp
  - hydra-rdf
  - hydra-pg
  - hydra-build

executables:
  cold-seed-from-json:
    main: ColdSeedMain.hs
    source-dirs:
      # The haskell-only cold seeder (a trimmed copy of the shared
      # bootstrap-from-json Main: no Hydra.Go.Coder, no Hydra.ExtGeneration,
      # no "go" dispatch; generateSourcesWithTransform from Hydra.Generation).
      - app
      # Head-only generation modules the cold seeder needs, EXACTLY four:
      # Hydra.{Generation,PackageRouting,TargetFilePaths,Digest}. bin/cold-seed-
      # dist-haskell.sh COPIES them here (gitignored, regenerated every run from the
      # canonical ../src/main/haskell — no content drift, and copies survive
      # git-archive/cp into a cold checkout where symlinks would not). We deliberately
      # do NOT source-dir the whole ../src/main/haskell tree: it also contains
      # Hydra.Coq.GenerateDriver (needs the unpublished Coq coder), Hydra.ExtGeneration
      # (unpublished ext/wasm/coq), Hydra.Haskell.Generation, Hydra.Minimal,
      # Hydra.Tools.* — hpack would add them all as other-modules and the build would
      # fail on the unpublished coders. Mirrors the Java json-driver's selective
      # `include 'hydra/Generation.java'` (which excludes hydra.GenerationTargets).
      - headmods
      # #608: the ONLY DSL authoring source compiled here is the Terms-FREE Types
      # subtree, which provides Hydra.Sources.Kernel.Types.All (kernelTypesModules)
      # — ColdSeedMain's JSON decode-universe context. typesmods/ is a build-time
      # copy of EXACTLY that closure: Hydra/Sources/Kernel/Types/** plus the single
      # Hydra/Sources/Json/Model.hs it imports (verified: that is the complete
      # transitive closure of Types.All, and none of it imports
      # Hydra.Sources.Kernel.Terms.*). bin/cold-seed-dist-haskell.sh refreshes it
      # from packages/hydra-kernel/src/main/haskell on every run (gitignored, never
      # hand-edited). We copy the SUBTREE rather than source-dir the whole
      # packages/hydra-kernel tree because hpack would then add the Terms modules
      # (incl. Print.Error.Core, phantom-annotated with HEAD-only kernel types) as
      # other-modules — the oil-and-water violation #608 fixes. Compiling only the
      # Terms-free Type DEFINITIONS against the published kernel keeps a single type
      # identity, so the published coders link with no local-vs-published mismatch.
      #
      # NO packages/hydra-{kernel,haskell,build}/src/main/haskell source-dirs, and
      # NO local kernel: ColdSeedMain imports no Terms-carrying Hydra.Sources.* module
      # (decode context is Types.All; testSkipEmitModuleNames is inlined).
      # Hydra.Build.Routing (used by headmods/PackageRouting.hs) resolves from the
      # published hydra-build library, not from Sources.Build.*.
      - typesmods
    ghc-options: [-rtsopts]
