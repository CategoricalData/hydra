name:         hydra
version:      0.15.0
author:       Joshua Shinavier <josh@fortytwo.net>
license:      Apache-2.0
license-file: LICENSE
category:     Data
synopsis:     "The Hydra Haskell head: primitives, DSL infrastructure, generation driver"
description:  >
  Hydra is an implementation of the LambdaGraph data model, which takes advantage of an isomorphism
  between labeled hypergraphs and typed lambda calculus: in Hydra, "graphs are programs, and programs are graphs".
  The Haskell head provides the hand-written Haskell runtime Hydra needs in order to build and
  regenerate itself: primitive libraries (Hydra.Lib.*), the embedded DSL infrastructure
  (Hydra.Dsl.*), the generation driver (Hydra.Generation), the kernel entry point (Hydra.Kernel),
  module support utilities, and the exec binaries that drive Hydra's Haskell code generation.
  It consumes the language-independent kernel DSL sources and generated kernel runtime from
  packages/hydra-kernel/, plus the Haskell coder DSL sources and generated output from
  packages/hydra-haskell/, and produces all Haskell-host build artifacts.
github:       CategoricalData/hydra

extra-source-files:
  - LICENSE

dependencies:
  - aeson                         >= 2.1.0 && < 2.3
  - base                          >= 4.19.0 && < 4.22
  - base64-bytestring             >= 1.2.1 && < 1.3
  - bytestring                    >= 0.11.5 && < 0.13
  - containers                    >= 0.6.7 && < 0.8
  - directory                     >= 1.3.6 && < 1.4
  - filepath                      >= 1.4.200 && < 1.6
  - regex-tdfa                    >= 1.3.2 && < 1.4
  - scientific                    >= 0.3.7 && < 0.4
  - SHA                           >= 1.6.4 && < 1.7
  - split                         >= 0.2.3 && < 0.3
  - text                          >= 2.0.2 && < 2.2
  - vector                        >= 0.12.0 && < 0.14

library:
  source-dirs:
    - src/main/haskell
    - ../../demos/src/main/haskell
    - ../../dist/haskell/hydra-kernel/src/main/haskell
    - ../../dist/haskell/hydra-ext/src/main/haskell
    - ../../dist/haskell/hydra-pg/src/main/haskell
    - ../../packages/hydra-coq/src/main/haskell
    - ../../packages/hydra-haskell/src/main/haskell
    - ../../dist/haskell/hydra-haskell/src/main/haskell
    - ../../packages/hydra-java/src/main/haskell
    - ../../packages/hydra-javascript/src/main/haskell
    - ../../packages/hydra-kernel/src/main/haskell
    - ../../packages/hydra-lisp/src/main/haskell
    - ../../packages/hydra-ext/src/main/haskell
    - ../../packages/hydra-pg/src/main/haskell
    - ../../packages/hydra-python/src/main/haskell
    - ../../packages/hydra-rdf/src/main/haskell
    - ../../packages/hydra-scala/src/main/haskell

executables:
  update-json-kernel:
    main: Main.hs
    source-dirs:
      - src/exec/update-json-kernel
    ghc-options: [-rtsopts]
    dependencies:
      - hydra

  update-json-main:
    main: Main.hs
    source-dirs:
      - src/exec/update-json-main
    ghc-options: [-rtsopts]
    dependencies:
      - hydra

  transform-haskell-dsl-to-json:
    main: Main.hs
    source-dirs:
      - src/exec/transform-haskell-dsl-to-json
    ghc-options: [-rtsopts]
    dependencies:
      - hydra

  update-json-test:
    main: Main.hs
    source-dirs:
      - src/exec/update-json-test
    ghc-options: [-rtsopts]
    dependencies:
      - hydra

  update-json-manifest:
    main: Main.hs
    source-dirs:
      - src/exec/update-json-manifest
    ghc-options: [-rtsopts]
    dependencies:
      - hydra

  verify-json-kernel:
    main: Main.hs
    source-dirs:
      - src/exec/verify-json-kernel
    ghc-options: [-rtsopts]
    dependencies:
      - hydra

  update-haskell-ext-main:
    main: Main.hs
    source-dirs:
      - src/exec/update-haskell-ext-main
    ghc-options: [-rtsopts]
    dependencies:
      - hydra

  update-ext-sources:
    main: Main.hs
    source-dirs:
      - src/exec/update-ext-sources
    ghc-options: [-rtsopts]
    dependencies:
      - hydra

  diag-module:
    main: Main.hs
    source-dirs:
      - src/exec/diag-module
    ghc-options: [-rtsopts]
    dependencies:
      - hydra

  generate-coq:
    main: Main.hs
    source-dirs:
      - src/exec/generate-coq
    ghc-options: [-rtsopts]
    dependencies:
      - hydra

  bootstrap-from-json:
    main: Main.hs
    source-dirs:
      - src/exec/bootstrap-from-json
      - ../../dist/haskell/hydra-kernel/src/test/haskell
    ghc-options: [-rtsopts]
    dependencies:
      - hydra
      - hspec                      >= 2.11.0 && < 2.12
      - time

tests:
  hydra-test:
    main: Spec.hs
    source-dirs:
      - src/test/haskell
      - ../../dist/haskell/hydra-kernel/src/test/haskell
    dependencies:
      - hydra
      - hspec                      >= 2.11.0 && < 2.12
      - hspec-discover              >= 2.11.0 && < 2.12
      - HUnit
      - QuickCheck
      - mtl
      - process
      - time
