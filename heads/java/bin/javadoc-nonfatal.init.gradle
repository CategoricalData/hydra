// TEMPORARY Gradle init script — relaxes Javadoc fail-on-error for the 0.16.1
// Maven Central publish and packaging-boundary verifier, applied transiently via
//   gradle --init-script javadoc-nonfatal.init.gradle ...
//
// This does NOT modify any generated build.gradle or the generator. The strict
// default (withJavadocJar + fail-on-error) stays in place, so a plain
// `gradle build` CONTINUES to fail on generated comment HTML escaping errors
// tracked in issue #493. Once #493 lands, this init script and the
// --allow-javadoc-errors flag in publish-maven.sh should be deleted.
//
// All #493 errors are cosmetic Javadoc rendering errors (no structural/compile
// errors); the published jars are unaffected.
allprojects {
    tasks.withType(Javadoc).configureEach {
        failOnError = false
    }
}
