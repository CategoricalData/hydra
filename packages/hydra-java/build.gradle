plugins {
    id 'maven-publish'
    id 'signing'
}

// The developer rollup aggregates every dist/java/<pkg>/ tree plus demos.
// Hand-written runtime support that the kernel assembler copies into
// dist/java/hydra-kernel/ comes in via that srcDir; the leftover hand-written
// files in heads/java (developer drivers like Bootstrap, Generation,
// HydraTestBase, plus third-party-binding files) live in a separate
// `headsExtras` source set so we can filter them with their own include
// patterns without affecting the kernel dist's classes.
sourceSets {
    // The kernel-and-coders source set is the bulk of the rollup. It pulls
    // every dist/java/<pkg>/ source tree (which includes the kernel runtime
    // classes copied in by heads/java/bin/copy-kernel-runtime.sh) but NOT
    // heads/java directly, to avoid duplicate-class errors with the copied
    // kernel runtime.
    main {
        java {
            srcDirs += file("$projectDir/../../dist/java/hydra-kernel/src/main/java")
            srcDirs += file("$projectDir/../../dist/java/hydra-haskell/src/main/java")
            srcDirs += file("$projectDir/../../dist/java/hydra-jvm/src/main/java")
            srcDirs += file("$projectDir/../../dist/java/hydra-java/src/main/java")
            srcDirs += file("$projectDir/../../dist/java/hydra-python/src/main/java")
            srcDirs += file("$projectDir/../../dist/java/hydra-scala/src/main/java")
            srcDirs += file("$projectDir/../../dist/java/hydra-lisp/src/main/java")
            srcDirs += file("$projectDir/../../dist/java/hydra-typescript/src/main/java")
            // hydra-build (#546): the build system promoted into Hydra. Included in
            // the rollup (unlike pg/rdf/ext) because CharacterizeBuildRoutingTest in
            // heads/java/src/test consumes hydra.build.Routing directly. It moved out
            // of the kernel, so its dist/java tree must be added here explicitly.
            srcDirs += file("$projectDir/../../dist/java/hydra-build/src/main/java")
            // Java-language DSL sources for hydra-jvm and hydra-java (#505, #344).
            // Each class under hydra/sources/{jvm,java}/* exposes a static
            // module_ : Module field; the UpdateJavaJson driver discovers them via
            // reflection. hydra-jvm must precede hydra-java (dependency order).
            srcDirs += file("$projectDir/../hydra-jvm/src/main/java")
            srcDirs += file("$projectDir/src/main/java")
            // hydra-pg, hydra-rdf, hydra-ext are NOT included here — they're
            // independent Maven artifacts (published per-package from their
            // dist/java/<pkg>/build.gradle) and don't belong in the rollup.
            // Code that needs them (the cypher binding, demos) consumes them
            // via Maven coords.
        }
    }
    // Files in heads/java that are NOT copied into dist/java/hydra-kernel
    // (developer drivers + json-io coder stub). Compiles AFTER main so it
    // can see the kernel + every coder package on the classpath.
    //
    // The cypher/gql/rdf integrations and the AntlrReaderBase utility, plus the
    // pg DSL helpers (Queries, Graphs, *Builder, Merging), now live as host-native
    // overlay source under overlay/java/hydra-{pg,rdf}/ (folded from the former
    // bindings/java/* in #511; see docs/overlays.md). The validatepg/genpg demos
    // that consume those have been removed from this rollup; once they have their
    // own gradle subproject (e.g. demos/pg-rdf-demos/) they will be reinstated
    // there.
    headsExtras {
        java {
            srcDir file("$projectDir/../../heads/java/src/main/java")
            include 'hydra/BenchInference.java'
            include 'hydra/Bootstrap.java'
            include 'hydra/Generation.java'
            include 'hydra/GenerationTargets.java'
            include 'hydra/HydraTestBase.java'
            include 'hydra/UpdateJavaJson.java'
            include 'hydra/ProfileJavaCoder.java'
            include 'hydra/json/JsonIoCoder.java'
            include 'hydra/json/JsonSerde.java'
        }
        compileClasspath += sourceSets.main.output + sourceSets.main.compileClasspath
        runtimeClasspath += sourceSets.main.output + sourceSets.main.runtimeClasspath
    }
    // hydra-build (#560): heads/java/src/main/java/hydra/Generation.java calls
    // hydra.build.Routing (manifest-derived routing, replacing the former
    // hand-coded PACKAGE_PREFIXES table). Routing.java lives under
    // dist/java/hydra-build/src/main/java, already a `main` srcDir above (#546),
    // so headsExtras gets it transitively via `compileClasspath += main.output`.
    // That transitive path depends on Gradle correctly ordering
    // :hydra-java:compileJava before :hydra-java:compileHeadsExtrasJava, which
    // it does locally (verified via --dry-run) but proved fragile in CI (#560
    // red-main incident: compileHeadsExtrasJava failed with "package hydra.build
    // does not exist" against a freshly-downloaded dist/java artifact). Root
    // cause not fully pinned down (candidate: Gradle configuration-time srcDir
    // evaluation racing the artifact-download step, or a similar timing gap
    // outside a single local invocation's visibility) — this guard makes the
    // dependency EXPLICIT and gives a clear, actionable failure instead of a
    // cryptic javac error if it recurs, regardless of root cause.
    tasks.named('compileHeadsExtrasJava') {
        dependsOn tasks.named('compileJava')
        doFirst {
            def hydraBuildRouting = file("$projectDir/../../dist/java/hydra-build/src/main/java/hydra/build/Routing.java")
            if (!hydraBuildRouting.exists()) {
                throw new GradleException(
                    "dist/java/hydra-build/src/main/java/hydra/build/Routing.java is missing. " +
                    "heads/java/src/main/java/hydra/Generation.java imports hydra.build.Routing " +
                    "(#560) and needs it on the compile classpath via the `main` source set's " +
                    "srcDir. Run `bin/sync-packages.sh hydra-build --targets java` (or a full " +
                    "`bin/sync.sh` including java) to regenerate it before compiling.")
            }
        }
    }
    test {
        java {
            srcDirs += file("$projectDir/../../heads/java/src/test/java")
            srcDirs += file("$projectDir/../../dist/java/hydra-kernel/src/test/java")
            // hydra-build (#546): the hydra.test.build.* classes moved here from the
            // kernel test tree. Kept on the test compile path so the build tests
            // remain available to the runner.
            srcDirs += file("$projectDir/../../dist/java/hydra-build/src/test/java")
        }
        compileClasspath += sourceSets.headsExtras.output
        runtimeClasspath += sourceSets.headsExtras.output
    }
}

// Bundle headsExtras output into the rollup jar.
jar {
    from sourceSets.headsExtras.output
}

dependencies {
    // Note: these are currently "main" dependencies rather than "test" dependencies due to reusable test utilities.
    //       These will likely be broken out into a separate module in the future.
    api(platform(group: 'org.junit', name: 'junit-bom', version: junitVersion))
    api('org.junit.jupiter:junit-jupiter')
    api group: 'org.junit.jupiter', name: 'junit-jupiter-params', version: junitVersion

    // json-io powers JsonIoCoder.java in headsExtras (the JSON serialization stub
    // for the bootstrap demo). Kept as a hydra-java dep until JsonIoCoder
    // either moves to a binding or is replaced.
    api group: 'com.cedarsoftware', name: 'json-io', version: '4.14.1'

    testImplementation 'org.apache.commons:commons-csv:1.10.0'
}

tasks.named('sourcesJar') {
    duplicatesStrategy = DuplicatesStrategy.INCLUDE
}

// Print the headsExtras runtime classpath (main + headsExtras outputs plus
// every resolved third-party jar) on a single line. Consumed by
// demos/bootstrapping/bin/invoke-java-host.sh so it doesn't need to
// hand-build a classpath by walking ~/.gradle/caches with hardcoded jar
// versions. Reads dependency declarations as the source of truth via
// Gradle's resolution machinery.
tasks.register('printHeadsExtrasRuntimeClasspath') {
    doLast {
        println sourceSets.headsExtras.runtimeClasspath.asPath
    }
}

// hydra/scala/** and hydra/dsl/scala/** used to be excluded here because the
// Scala coder's generated Java didn't type-check standalone (and hydra/lisp/Coder.java
// as a generator wart). The wart is fixed — both packages now compile cleanly, and
// Generation.java#writeScala dispatches Java->Scala via hydra.scala.Coder — so the
// excludes were removed. For #409 / #421.
compileJava {
    options.fork = true
    options.forkOptions.memoryMaximumSize = '6g'
}

// Test-side excludes: tests that imported the cypher/rdf/pg code now living as
// overlay source under overlay/java/hydra-{pg,rdf}/ (folded from the former
// bindings/java/* in #511; see docs/overlays.md). The tests themselves still live
// in heads/java/src/test/java/hydra/{cypher,pg}/ and need their own move; those
// tests need a shared HydraTestBase placement decision first.
compileTestJava {
    exclude '**/hydra/cypher/**'
    exclude '**/hydra/pg/**'
}

test {
    useJUnitPlatform()
    testLogging {
        events "failed"
        exceptionFormat "short"
    }
    jvmArgs '-Xmx512m'
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from(components.java)

            pom {
                name = 'hydra-java'
                description = 'Java support for Hydra'
                url = 'https://github.com/CategoricalData/hydra'
                licenses {
                    license {
                        name = 'The Apache License, Version 2.0'
                        url = 'http://www.apache.org/licenses/LICENSE-2.0.txt'
                    }
                }
                developers {
                    developer {
                        id = 'joshsh'
                        name = 'Joshua Shinavier'
                        email = 'josh@fortytwo.net'
                    }
                }
                scm {
                    url = 'https://github.com/CategoricalData/hydra'
                    connection = 'scm:git://github.com/CategoricalData/hydra.git'
                    developerConnection = 'scm:git://github.com/CategoricalData/hydra.git'
                }
            }
        }
    }
}

signing {
    sign publishing.publications.mavenJava
}
