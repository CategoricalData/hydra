name:         hydra-kernel
version:      0.15.0
author:       Joshua Shinavier <josh@fortytwo.net>
license:      Apache-2.0
license-file: LICENSE
category:     Data
synopsis:     "The Hydra kernel: core types, terms, DSL, eval, primitives"
description:  >
  Hydra is an implementation of the LambdaGraph data model, which takes advantage of an isomorphism
  between labeled hypergraphs and typed lambda calculus: in Hydra, "graphs are programs, and programs are graphs".
  This package contains the Hydra kernel -- core types and terms, the Haskell-based DSLs
  used to author Hydra modules, the kernel primitives, and the evaluation and inference
  engines. It is language-independent in scope: implementations in other host languages
  (Java, Python, Scala, Lisp, etc.) generate from the same kernel definitions.
github:       CategoricalData/hydra

extra-source-files:
  - LICENSE

dependencies:
  - aeson                         >= 2.1.0 && < 2.3
  - base                          >= 4.19.0 && < 4.22
  - base64-bytestring             >= 1.2.1 && < 1.3
  - bytestring                    >= 0.11.5 && < 0.13
  - containers                    >= 0.6.7 && < 0.8
  - directory                     >= 1.3.6 && < 1.4
  - filepath                      >= 1.4.200 && < 1.6
  - regex-tdfa                    >= 1.3.2 && < 1.4
  - scientific                    >= 0.3.7 && < 0.4
  - split                         >= 0.2.3 && < 0.3
  - text                          >= 2.0.2 && < 2.2
  - vector                        >= 0.12.0 && < 0.14

library:
  source-dirs:
    - src/main/haskell
    - src/gen-main/haskell

tests:
  hydra-kernel-test:
    main: Spec.hs
    source-dirs:
      - src/test/haskell
      - src/gen-test/haskell
    dependencies:
      - hydra-kernel
      - hspec                      >= 2.11.0 && < 2.12
      - hspec-discover              >= 2.11.0 && < 2.12
      - HUnit
      - QuickCheck
      - mtl # For the Algorithm W reference implementation
      - process # For git metadata in benchmark output
      - time # For timestamps in benchmark output
